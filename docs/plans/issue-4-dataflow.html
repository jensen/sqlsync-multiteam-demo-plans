<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../../extra.css">
</head>
<body>
<div class="diagram">
  <div class="diagram-title">Data Flow: User Adds a Comment</div>
  <div class="diagram-flow-horizontal">
    <div class="diagram-flow-node">
      <div class="diagram-flow-label">User Input</div>
      <div class="diagram-flow-sublabel">types in textarea</div>
    </div>
    <div class="diagram-flow-arrow">→</div>
    <div class="diagram-flow-node">
      <div class="diagram-flow-label">CommentInput</div>
      <div class="diagram-flow-sublabel">onSubmit</div>
    </div>
    <div class="diagram-flow-arrow">→</div>
    <div class="diagram-flow-node">
      <div class="diagram-flow-label">useMutate</div>
      <div class="diagram-flow-sublabel">AddComment mutation</div>
    </div>
    <div class="diagram-flow-arrow">→</div>
    <div class="diagram-flow-node">
      <div class="diagram-flow-label">SQLSync Worker</div>
      <div class="diagram-flow-sublabel">serialize → apply</div>
    </div>
    <div class="diagram-flow-arrow">→</div>
    <div class="diagram-flow-node">
      <div class="diagram-flow-label">WASM Reducer</div>
      <div class="diagram-flow-sublabel">INSERT INTO comments</div>
    </div>
    <div class="diagram-flow-arrow">→</div>
    <div class="diagram-flow-node">
      <div class="diagram-flow-label">Sync</div>
      <div class="diagram-flow-sublabel">broadcast to peers</div>
    </div>
    <div class="diagram-flow-arrow">→</div>
    <div class="diagram-flow-node">
      <div class="diagram-flow-label">CommentList</div>
      <div class="diagram-flow-sublabel">re-renders via useQuery</div>
    </div>
  </div>
</div>
</body>
</html>
