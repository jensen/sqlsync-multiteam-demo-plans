<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="../../extra.css">
</head>
<body>
<div class="diagram">
  <div class="diagram-title">Before/After: Issue Detail Page</div>
  <div class="diagram-comparison">
    <div class="diagram-comparison-side before">
      <div class="diagram-comparison-title">❌ BEFORE</div>
      <div class="diagram-comparison-content">
        <div class="diagram-step"><span class="diagram-step-text">Issue title & body</span></div>
        <div class="diagram-connector"></div>
        <div class="diagram-step"><span class="diagram-step-text">Assignee / Status / Priority</span></div>
        <div class="diagram-connector"></div>
        <div class="diagram-step"><span class="diagram-step-text">Project select</span></div>
        <div class="diagram-connector"></div>
        <div class="diagram-step error"><span class="diagram-step-text">No comments ❌</span></div>
        <div class="diagram-connector"></div>
        <div class="diagram-step error"><span class="diagram-step-text">No activity history ❌</span></div>
      </div>
    </div>
    <div class="diagram-comparison-divider"></div>
    <div class="diagram-comparison-side after">
      <div class="diagram-comparison-title">✅ AFTER</div>
      <div class="diagram-comparison-content">
        <div class="diagram-step"><span class="diagram-step-text">Issue title & body</span></div>
        <div class="diagram-connector"></div>
        <div class="diagram-step"><span class="diagram-step-text">Assignee / Status / Priority</span></div>
        <div class="diagram-connector"></div>
        <div class="diagram-step"><span class="diagram-step-text">Project select</span></div>
        <div class="diagram-connector"></div>
        <div class="diagram-step"><span class="diagram-step-text">Tab: Details | Comments (3) | Activity</span></div>
        <div class="diagram-connector"></div>
        <div class="diagram-step success"><span class="diagram-step-text">Comment list + input ✅</span></div>
        <div class="diagram-connector"></div>
        <div class="diagram-step success"><span class="diagram-step-text">Activity timeline ✅</span></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
